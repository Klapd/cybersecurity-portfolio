<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Jake McCarvill</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: white;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #161b22;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #30363d;
        }

        header h1 {
            margin: 0;
            font-size: 42px;
            color: #58a6ff;
        }

        nav {
            margin-top: 20px;
        }

        nav a {
            text-decoration: none;
            margin: 10px;
        }

        .nav-button {
            background-color: #21262d;
            color: white;
            border: 1px solid #30363d;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-button:hover {
            background-color: #58a6ff;
            color: black;
        }

        main {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        .resume-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
        }

        .resume-card h2 {
            color: #58a6ff;
            margin-top: 0;
            font-size: 42px;
        }

        .resume-card p {
            color: #c9d1d9;
            font-size: 20px;
            line-height: 1.7;
        }

        .button-row {
            margin: 25px 0;
        }

        .resume-button {
            display: inline-block;
            text-decoration: none;
            background-color: #21262d;
            color: white;
            border: 1px solid #30363d;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 18px;
            margin: 8px;
            transition: 0.3s;
        }

        .resume-button:hover {
            background-color: #58a6ff;
            color: black;
        }

        .pdf-container {
            margin-top: 30px;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            background-color: #0d1117;
        }

        iframe {
            width: 100%;
            height: 850px;
            border: none;
        }

        .mobile-resume-note {
            display: none;
            margin-top: 25px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }

        .mobile-resume-note p {
            font-size: 17px;
            line-height: 1.6;
            margin: 0;
            color: #c9d1d9;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #8b949e;
            border-top: 2px solid #30363d;
            margin-top: 100px;
        }

        @media (max-width: 768px) {
            header {
                padding: 18px 10px;
            }

            header h1 {
                font-size: 32px;
            }

            nav {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                margin-top: 18px;
            }

            nav a {
                margin: 0;
            }

            .nav-button {
                font-size: 15px;
                padding: 10px 16px;
            }

            main {
                margin: 25px auto;
                padding: 15px;
            }

            .resume-card {
                padding: 22px 16px;
                border-radius: 12px;
            }

            .resume-card h2 {
                font-size: 34px;
            }

            .resume-card p {
                font-size: 17px;
            }

            .button-row {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin: 22px 0;
            }

            .resume-button {
                display: block;
                width: 100%;
                box-sizing: border-box;
                margin: 0;
                font-size: 16px;
                padding: 13px 18px;
            }

            .pdf-container {
                display: none;
            }

            .mobile-resume-note {
                display: block;
            }

            footer {
                margin-top: 60px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 28px;
            }

            .nav-button {
                font-size: 14px;
                padding: 9px 13px;
            }

            .resume-card h2 {
                font-size: 30px;
            }

            .resume-card p {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Jake McCarvill</h1>

        <nav>
            <a href="index.html">
                <button class="nav-button">Home</button>
            </a>

            <a href="resume.html">
                <button class="nav-button">Resume</button>
            </a>

            <a href="projects.html">
                <button class="nav-button">Projects</button>
            </a>

            <a href="about.html">
                <button class="nav-button">About Me</button>
            </a>

            <a href="contact.html">
                <button class="nav-button">Contact</button>
            </a>
        </nav>
    </header>

    <main>

        <section class="resume-card">

            <h2>Resume</h2>

            <p>
                View or download my current resume below.
            </p>

            <div class="button-row">

                <a class="resume-button" href="McCarvill_Resume.pdf?v=2" target="_blank">
                    View Resume PDF
                </a>

                <a class="resume-button" href="McCarvill_Resume.pdf" download>
                    Download Resume PDF
                </a>

            </div>

            <div class="mobile-resume-note">
                <p>
                    For the best mobile viewing experience, open the resume PDF in a new tab
                    or download it directly using the buttons above.
                </p>
            </div>

            <div class="pdf-container">
                <iframe src="McCarvill_Resume.pdf?v=2"></iframe>
            </div>

        </section>

    </main>

    <footer>
        © 2026 Jake McCarvill
    </footer>

</body>
</html>
